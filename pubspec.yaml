name: todo_story
description: "TodoStory — personal todo app with Google Calendar sync and timeline."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Firebase
  firebase_core: ^3.9.0
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.5.1

  # Navigation
  go_router: ^14.6.2

  # Fonts
  google_fonts: ^6.2.1

  # Utils
  uuid: ^4.5.1
  google_sign_in: ^6.2.2
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
